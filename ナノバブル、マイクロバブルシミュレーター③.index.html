<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流体・気泡ダイナミクス グルーミングシミュレーター</title>
<style>
    :root {
        --primary-color: #2c3e50;
        --bg-color: #f5f6fa;
        --canvas-bg: #e8f4f8;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 10px;
        color: var(--primary-color);
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    canvas {
        width: 100%;
        height: 350px;
        background-color: var(--canvas-bg);
        display: block;
    }
    .controls {
        padding: 15px;
        font-size: 14px;
    }
    .control-group {
        margin-bottom: 15px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }
    .radio-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 5px;
    }
    .radio-group label {
        font-weight: normal;
        background: #f1f2f6;
        padding: 8px 12px;
        border-radius: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
        font-size: 13px;
    }
    .radio-group input[type="radio"] { margin: 0; }
    .radio-group label:has(input:checked) {
        background: #3498db;
        color: white;
    }
    input[type="range"] {
        width: 100%;
        max-width: 300px;
    }
    .btn-start {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        transition: 0.2s;
        margin-top: 5px;
    }
    .btn-start:hover { background-color: #c0392b; }
    .status-panel {
        display: flex;
        justify-content: space-between;
        background: #2c3e50;
        color: white;
        padding: 15px;
        margin-top: 15px;
        border-radius: 5px;
    }
    .gauge { width: 48%; }
    .gauge-bar-bg {
        background: #576574;
        height: 10px;
        border-radius: 5px;
        margin-top: 5px;
        overflow: hidden;
    }
    .gauge-bar-fill {
        background: #2ecc71;
        height: 100%;
        width: 0%;
        transition: width 0.3s;
    }
    #damageFill { background: #e74c3c; }
    .info-text {
        margin-top: 10px;
        font-size: 13px;
        color: #e74c3c;
        font-weight: bold;
        min-height: 40px;
    }
    .disclaimer {
        font-size: 11px;
        color: #7f8c8d;
        text-align: right;
        margin-top: 10px;
        line-height: 1.5;
    }
</style>
</head>
<body>

<div class="container">
    <canvas id="simCanvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>犬種モデル（被毛の太さと構造）</label>
            <div class="radio-group">
                <label><input type="radio" name="breed" value="poodle" checked> プードル（被毛径: 約0.05mm / 細め・巻き毛）</label>
                <label><input type="radio" name="breed" value="shiba"> 柴犬（オーバーコート径: 約0.08mm / アンダーコート径: 約0.02mm / ダブルコート）</label>
            </div>
        </div>

        <div class="control-group">
            <label>洗浄モード</label>
            <div class="radio-group">
                <label><input type="radio" name="mode" value="tub" checked> ① 浴槽に水を溜めた状態（静水）</label>
                <label><input type="radio" name="mode" value="shower"> ② シャワー（流水）</label>
            </div>
        </div>

        <div class="control-group" id="deviceGroup" style="opacity: 0.5; pointer-events: none;">
            <label>水流デバイス（流水時のみ有効）</label>
            <div class="radio-group">
                <label><input type="radio" name="device" value="head" checked> シャワーヘッド</label>
                <label><input type="radio" name="device" value="hose"> ホース直出し</label>
            </div>
        </div>

        <div class="control-group">
            <label>バブル選択</label>
            <div class="radio-group">
                <label><input type="radio" name="bubble" value="none" checked> 通常の水の流体</label>
                <label><input type="radio" name="bubble" value="mb"> マイクロバブル (MB)</label>
                <label><input type="radio" name="bubble" value="ufb"> ウルトラファインバブル（ナノバブル）</label>
            </div>
        </div>

        <div class="control-group">
            <label>被毛の密度 (本数): <span id="densityVal">20</span></label>
            <input type="range" id="densitySlider" min="4" max="200" value="20">
        </div>

        <button class="btn-start" id="startBtn">シミュレーション開始 / リセット</button>

        <div class="info-text" id="infoText">条件を設定して開始してください。</div>

        <div class="status-panel">
            <div class="gauge">
                <div>汚れ除去率 <span id="cleanRate">0</span>%</div>
                <div class="gauge-bar-bg"><div class="gauge-bar-fill" id="cleanFill"></div></div>
            </div>
            <div class="gauge">
                <div>皮膚ダメージ <span id="damageRate">0</span>%</div>
                <div class="gauge-bar-bg"><div class="gauge-bar-fill" id="damageFill"></div></div>
            </div>
        </div>
        
        <div class="disclaimer">
            ※水温37℃と仮定する<br>
            ※犬のコンディション個体差によって差異があり、これは理論値です。
        </div>
    </div>
</div>

<script>
// --- Canvas セットアップ ---
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;
function resize() {
    cw = canvas.clientWidth;
    ch = canvas.clientHeight;
    canvas.width = cw;
    canvas.height = ch;
}
window.addEventListener('resize', resize);
resize();

// --- 状態管理 ---
let isRunning = false;
let animationId;
let config = { breed: 'poodle', mode: 'tub', device: 'head', bubble: 'none', density: 20 };
let stats = { totalDirt: 0, removedDirt: 0, damage: 0 };

let hairs = [];
let dirts = [];
let waters = [];
let bubbles = [];

// --- 物理オブジェクトの定義 ---

// 被毛
class Hair {
    constructor(x) {
        this.x = x;
        this.height = ch * 0.7 + (Math.random() * 20 - 10);
        this.cpX = x + (Math.random() * 40 - 20);
    }
    draw() {
        if (config.breed === 'poodle') {
            // プードル: 細い巻き毛 (約0.05mmモデル)
            ctx.beginPath();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#5d4037';
            ctx.moveTo(this.x, ch);
            ctx.bezierCurveTo(this.cpX - 15, ch - this.height * 0.3, this.cpX + 15, ch - this.height * 0.6, this.x, ch - this.height);
            ctx.stroke();
        } else {
            // 柴犬: オーバーコート (太め・直毛 約0.08mmモデル)
            ctx.beginPath();
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#3e2723';
            ctx.moveTo(this.x, ch);
            ctx.quadraticCurveTo(this.cpX, ch - this.height/2, this.x, ch - this.height);
            ctx.stroke();

            // 柴犬: アンダーコート (細め・柔らかい 約0.02mmモデル)
            for (let i = 0; i < 2; i++) {
                ctx.beginPath();
                ctx.lineWidth = 1.0;
                ctx.strokeStyle = '#6d4c41'; 
                let uh = this.height * 0.5 + Math.random() * 20; 
                let ucpX = this.x + (Math.random() * 30 - 15);
                ctx.moveTo(this.x, ch);
                ctx.bezierCurveTo(ucpX - 10, ch - uh * 0.3, ucpX + 10, ch - uh * 0.6, this.x + (Math.random() * 10 - 5), ch - uh);
                ctx.stroke();
            }
        }
    }
}

// 汚れ
class Dirt {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'mud' or 'sebum'
        this.isAttached = true;
        this.vy = 0;
        this.size = Math.random() * 3 + 2;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.type === 'mud' ? '#795548' : '#f1c40f';
        ctx.fill();
    }
    update() {
        if (!this.isAttached) {
            this.y += this.vy;
        }
    }
}

// 水流
class Water {
    constructor() {
        this.x = Math.random() * cw;
        this.y = 0;
        if (config.device === 'head') {
            this.vy = 15 + Math.random() * 5;
            this.width = 1;
            this.height = 20;
            this.color = 'rgba(52, 152, 219, 0.6)';
        } else {
            this.vy = 5 + Math.random() * 3;
            this.width = 15 + Math.random() * 10;
            this.height = 30;
            this.color = 'rgba(41, 128, 185, 0.3)';
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
    update() {
        if (config.device === 'hose' && config.density > 100 && this.y > ch * 0.3) {
            this.x += (Math.random() - 0.5) * 10;
            this.vy = 1;
        } else {
            this.y += this.vy;
        }
    }
}

// バブル
class Bubble {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.type = config.bubble;
        this.attachedDirt = null;
        if (this.type === 'mb') {
            this.size = 3;
            this.vy = -1 - Math.random(); // 浮力
        } else {
            this.size = 1.5;
            this.vy = 0; // 浮力ゼロ
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.fill();
    }
    update() {
        if (this.type === 'mb') {
            this.y += this.vy;
            if (this.attachedDirt) {
                this.attachedDirt.y = this.y;
                this.attachedDirt.x = this.x;
            }
        } else if (this.type === 'ufb') {
            if (config.mode === 'tub') {
                this.x += (Math.random() - 0.5) * 2;
                this.y += (Math.random() - 0.5) * 2;
            } else {
                this.y += 10; 
            }
        }
    }
}

// --- メインロジック ---

function initSimulation() {
    cancelAnimationFrame(animationId);
    hairs = []; dirts = []; waters = []; bubbles = [];
    stats = { totalDirt: 0, removedDirt: 0, damage: 0 };
    updateGauges();

    config.breed = document.querySelector('input[name="breed"]:checked').value;
    config.mode = document.querySelector('input[name="mode"]:checked').value;
    config.device = document.querySelector('input[name="device"]:checked').value;
    config.bubble = document.querySelector('input[name="bubble"]:checked').value;
    config.density = parseInt(document.getElementById('densitySlider').value);

    const gap = cw / (config.density + 1);
    for (let i = 1; i <= config.density; i++) {
        let h = new Hair(i * gap);
        hairs.push(h);
        
        let dirtCount = Math.floor(200 / config.density);
        if(dirtCount < 2) dirtCount = 2;
        if(config.breed === 'shiba') dirtCount = Math.floor(dirtCount * 1.5); 

        for (let j = 0; j < dirtCount; j++) {
            let dy = ch - Math.random() * h.height;
            let dx = h.x + (Math.random() * 10 - 5);
            let type = Math.random() > 0.5 ? 'mud' : 'sebum';
            dirts.push(new Dirt(dx, dy, type));
            stats.totalDirt++;
        }
    }

    updateInfoText();
    isRunning = true;
    loop();
}

function updateInfoText() {
    let text = "";
    if (config.mode === 'tub') {
        canvas.style.backgroundColor = '#a2c2e0';
        if (config.bubble === 'mb') text = "【最適解】MBの静電気力と浮力により、皮脂も泥もこすらずに水面へ浮上します。";
        else if (config.bubble === 'ufb') text = "【物理的矛盾】ナノバブルは浮力を持たずブラウン運動をするため、静水では汚れを剥がせません。";
        else text = "通常の水の流体だけでは高粘度の皮脂は落ちません。";
    } else {
        canvas.style.backgroundColor = '#e8f4f8';
        if (config.device === 'hose') {
            if (config.density > 100) text = "【流体抵抗】被毛密度が高いため、低流速のホースの水は表面張力で弾かれ皮膚に届きません。こすり洗いが必要でダメージ大。";
            else text = "ホース直出しは動圧が低く物理的洗浄力が皆無です。こすり洗いによる摩擦ダメージが発生します。";
        } else {
            if (config.bubble === 'none') text = "シャワーの動圧で泥は落ちますが、高粘度の皮脂は通常の水だけでは落ちません。";
            else if (config.bubble === 'ufb') text = "【最適解】シャワーの高流速に乗ったナノバブルが毛穴に浸透し、皮脂も泥も強力に洗い流します。";
            else text = "シャワーの動圧で汚れは落ちますが、MBはシャワー用途には最適化されていません。";
        }
    }
    document.getElementById('infoText').innerText = text;
}

function physicsUpdate() {
    if (config.mode === 'shower' && Math.random() > 0.1) {
        for(let i=0; i < (config.device === 'head' ? 5 : 1); i++) {
            waters.push(new Water());
        }
    }

    if (config.bubble !== 'none') {
        if (config.mode === 'tub' && Math.random() > 0.2) {
            bubbles.push(new Bubble(Math.random() * cw, ch + 10));
        } else if (config.mode === 'shower' && Math.random() > 0.2) {
            bubbles.push(new Bubble(Math.random() * cw, 0));
        }
    }

    dirts.forEach(dirt => {
        if (!dirt.isAttached) return;

        if (config.mode === 'tub' && config.bubble === 'mb') {
            bubbles.forEach(b => {
                if (!b.attachedDirt && Math.abs(b.x - dirt.x) < 10 && Math.abs(b.y - dirt.y) < 10) {
                    dirt.isAttached = false;
                    dirt.vy = b.vy;
                    b.attachedDirt = dirt;
                }
            });
        }
        
        if (config.mode === 'shower') {
            let coatResistance = (config.breed === 'shiba' && config.density > 50) ? 0.5 : 0.4;
            if (config.device === 'hose' && config.density > 100 && dirt.y > ch * coatResistance) return;

            if (config.bubble === 'ufb') {
                if (Math.random() < 0.05) { dirt.isAttached = false; dirt.vy = 5; }
            } else if (config.device === 'head') {
                if (dirt.type === 'mud' && Math.random() < 0.05) { dirt.isAttached = false; dirt.vy = 5; }
            }
        }
    });

    if (config.mode === 'shower') {
        if (config.device === 'hose') stats.damage += 0.2;
        if (config.device === 'head' && config.bubble === 'none') stats.damage += 0.05;
    }

    waters = waters.filter(w => { w.update(); return w.y < ch; });
    bubbles = bubbles.filter(b => { b.update(); return b.y > -20 && b.y < ch + 20; });
    
    let currentAttached = 0;
    dirts = dirts.filter(d => {
        d.update();
        if (d.isAttached) currentAttached++;
        return d.y > -20 && d.y < ch + 20;
    });

    stats.removedDirt = stats.totalDirt - currentAttached;
    updateGauges();
}

function render() {
    ctx.clearRect(0, 0, cw, ch);
    waters.forEach(w => w.draw());
    hairs.forEach(h => h.draw());
    ctx.fillStyle = '#f8c291';
    ctx.fillRect(0, ch - 15, cw, 15);
    bubbles.forEach(b => b.draw());
    dirts.forEach(d => d.draw());
}

function loop() {
    if (!isRunning) return;
    physicsUpdate();
    render();
    animationId = requestAnimationFrame(loop);
}

function updateGauges() {
    if(stats.totalDirt === 0) return;
    let cleanPercent = Math.min(100, (stats.removedDirt / stats.totalDirt) * 100);
    let damagePercent = Math.min(100, stats.damage);
    
    document.getElementById('cleanRate').innerText = Math.floor(cleanPercent);
    document.getElementById('cleanFill').style.width = cleanPercent + '%';
    document.getElementById('damageRate').innerText = Math.floor(damagePercent);
    document.getElementById('damageFill').style.width = damagePercent + '%';

    if (cleanPercent >= 99 && damagePercent < 100) {
        isRunning = false;
        document.getElementById('infoText').innerText += " [シミュレーション完了]";
    }
}

// --- UI イベントリスナー ---
document.getElementById('startBtn').addEventListener('click', initSimulation);
document.getElementById('densitySlider').addEventListener('input', (e) => {
    document.getElementById('densityVal').innerText = e.target.value;
});

document.querySelectorAll('input[name="mode"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
        const devGroup = document.getElementById('deviceGroup');
        if (e.target.value === 'shower') {
            devGroup.style.opacity = '1';
            devGroup.style.pointerEvents = 'auto';
        } else {
            devGroup.style.opacity = '0.5';
            devGroup.style.pointerEvents = 'none';
        }
    });
});

initSimulation();
isRunning = false; 

</script>
</body>
</html>
